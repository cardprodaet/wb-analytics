name: WB Analytics Daily Update

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC = 06:00 МСК
  workflow_dispatch:

jobs:
  update-part1:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Create credentials file
      run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
    - name: Run part 1
      run: python main1.py

  update-part2:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: update-part1
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Create credentials file
      run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
    - name: Run part 2
      run: python main2.py
